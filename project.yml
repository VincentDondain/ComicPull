name: ComicPull
options:
  bundleIdPrefix: com.vincentdondain
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    ENABLE_USER_SCRIPT_SANDBOXING: "NO"

targets:
  ComicPull:
    type: application
    platform: iOS
    sources:
      - ComicPull
    settings:
      base:
        INFOPLIST_FILE: ComicPull/App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.vincentdondain.ComicPull
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_EMIT_LOC_STRINGS: "YES"
    scheme:
      testTargets:
        - ComicPullTests
        - ComicPullUITests
      gatherCoverageData: true

  ComicPullTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - ComicPullTests
    dependencies:
      - target: ComicPull
    settings:
      base:
        INFOPLIST_FILE: ComicPullTests/Info.plist
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/ComicPull.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/ComicPull"

  ComicPullUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - ComicPullUITests
    dependencies:
      - target: ComicPull
    settings:
      base:
        INFOPLIST_FILE: ComicPullUITests/Info.plist
        TEST_TARGET_NAME: ComicPull
